<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CoverPanda — Franchisee Onboarding Portal (Bright Pickleball · Tucson #1)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="../journey-nav.js"></script>
<style>
  :root{
    --bg:#fbfaf8;--panel:#f6f4f0;--stone:#efece6;--border:#e8e4dc;--border2:#ddd7cd;--card:#fff;
    --ink:#131210;--ink-soft:#36342f;--body:#4a4842;--muted:#6e6b63;--muted2:#8a867c;
    --ember:#ff3e00;--ember-soft:#ffece4;--ember-deep:#c93100;--green:#00a843;--green-soft:#e3f6ea;--green-deep:#00702e;
    --blue:#0084ec;--blue-soft:#e6f2fd;--violet:#6e56e8;--violet-soft:#efecfd;--amber:#a87a08;--amber-soft:#faf2dd;
    --font:'Instrument Sans',-apple-system,sans-serif;--display:'Fraunces',Georgia,serif;--mono:'Spline Sans Mono',ui-monospace,monospace;
    --inset:#efece6 0 0 0 1px inset;--inset2:#e8e4dc 0 0 0 1px inset;--pop:0 1px 2px rgba(19,18,16,.05),0 12px 34px rgba(19,18,16,.12);--pop-lg:0 2px 6px rgba(19,18,16,.07),0 24px 64px rgba(19,18,16,.16);
    --spring:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--body);-webkit-font-smoothing:antialiased;letter-spacing:-.008em;font-size:14px;min-height:100vh}
  .ic{width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
  .ic--s{width:13px;height:13px}.ic--l{width:20px;height:20px}

  /* portal top bar */
  .topbar{position:sticky;top:0;z-index:60;background:var(--card);border-bottom:1px solid var(--border);padding:0 26px}
  .tb-row{display:flex;align-items:center;gap:13px;height:58px;max-width:1080px;margin:0 auto}
  .tb-logo{width:30px;height:30px;border-radius:9px;background:var(--ink);display:grid;place-items:center;flex:none}
  .tb-brand{font-size:14.5px;font-weight:700;color:var(--ink)}
  .tb-sub{font-size:11.5px;color:var(--muted)}
  .tb-spacer{flex:1}
  .tb-prog{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
  .tb-ring{font-family:var(--display);font-size:15px;color:var(--ink)}
  .tb-av{width:32px;height:32px;border-radius:50%;background:var(--violet);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
  .tabs{display:flex;gap:2px;max-width:1080px;margin:0 auto}
  .tabs button{background:none;border:0;font-family:var(--font);font-size:13px;font-weight:600;color:var(--muted);padding:11px 14px;cursor:pointer;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:7px}
  .tabs button.on{color:var(--ink);border-bottom-color:var(--ink)}
  .tabs button:hover:not(.on){color:var(--ink-soft)}
  .tabs .badge{font-size:10px;font-weight:700;background:var(--ember);color:#fff;border-radius:99px;padding:1px 6px}

  .wrap{max-width:1080px;margin:0 auto;padding:26px 26px 90px}

  /* welcome */
  .welcome{display:flex;gap:16px;align-items:flex-start;background:var(--ink);color:#fff;border-radius:18px;padding:22px 24px;margin-bottom:22px}
  .welcome .wic{width:44px;height:44px;border-radius:13px;background:#262420;display:grid;place-items:center;flex:none}
  .welcome h1{font-family:var(--display);font-weight:500;font-size:24px;letter-spacing:-.01em}
  .welcome p{font-size:13.5px;color:#cdc9c1;margin-top:5px;line-height:1.55;max-width:560px}
  .welcome .wx{margin-left:auto;color:#8d897f;cursor:pointer;background:none;border:0}

  .seclab{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2)}

  /* phase rows */
  .phase{background:var(--card);border-radius:15px;box-shadow:var(--inset2);margin-bottom:11px;overflow:hidden}
  .phase.open{box-shadow:var(--inset2),var(--pop)}
  .ph-head{display:flex;align-items:center;gap:13px;padding:16px 18px;cursor:pointer}
  .ph-ic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex:none;background:var(--ncs);color:var(--nc)}
  .ph-t{font-size:15px;font-weight:700;color:var(--ink)}
  .ph-meta{font-size:12px;color:var(--muted);margin-top:1px}
  .ph-wk{font-family:var(--mono);font-size:11px;color:var(--muted2);background:var(--panel);border-radius:7px;padding:4px 9px;white-space:nowrap}
  .ph-prog{display:flex;align-items:center;gap:8px;margin-left:auto}
  .ph-bar{width:78px;height:6px;border-radius:99px;background:var(--panel);overflow:hidden}
  .ph-bar>div{height:100%;background:var(--nc);border-radius:99px;transition:width .4s var(--spring)}
  .ph-pct{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}
  .ph-chev{color:var(--muted2);transition:transform .25s var(--spring)}
  .phase.open .ph-chev{transform:rotate(90deg)}
  .ph-body{display:none;padding:2px 18px 16px 18px}
  .phase.open .ph-body{display:block}

  /* tasks */
  .task{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-top:1px solid #f4f1ec}
  .task .tk{width:20px;height:20px;border-radius:50%;border:1.6px solid var(--border2);flex:none;margin-top:1px;display:grid;place-items:center;color:transparent;cursor:pointer;transition:all .14s}
  .task.done .tk{background:var(--green);border-color:var(--green);color:#fff}
  .task .tt{font-size:13.5px;font-weight:600;color:var(--ink)}
  .task.done .tt{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--border2)}
  .task .td{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.45}
  .task .tact{margin-left:auto;display:flex;align-items:center;gap:7px;flex:none}
  .pill{font-size:10.5px;font-weight:700;border-radius:99px;padding:4px 9px;white-space:nowrap}
  .pill.up{color:var(--ink-soft);background:var(--panel)}
  .pill.opt{color:var(--muted2);background:transparent;box-shadow:var(--inset2)}
  .pill.done{color:var(--green-deep);background:var(--green-soft)}

  /* inline vendor-connect card */
  .vconnect{margin:10px 0 4px 32px;background:var(--panel);border-radius:13px;box-shadow:var(--inset2);padding:14px 15px}
  .vconnect.engaged{box-shadow:0 0 0 1.5px var(--green) inset;background:var(--green-soft)}
  .vconnect.requested{box-shadow:0 0 0 1.5px var(--amber) inset;background:var(--amber-soft)}
  .vconnect.self{background:var(--card);opacity:.92}
  .vc-top{display:flex;align-items:center;gap:10px}
  .vc-pa{width:28px;height:28px;border-radius:9px;background:var(--ink);display:grid;place-items:center;flex:none}
  .vc-lead{font-size:12.5px;font-weight:700;color:var(--ink)}
  .vc-sub{font-size:11.5px;color:var(--muted);margin-top:1px;line-height:1.45}
  .vc-row{display:flex;align-items:center;gap:12px;margin-top:12px;background:var(--card);border-radius:11px;box-shadow:var(--inset2);padding:11px 13px}
  .vc-logo{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:14px;color:#fff;flex:none}
  .vc-name{font-size:13px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .vc-meta{font-size:11px;color:var(--muted);margin-top:1px}
  .vbadge{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border-radius:99px;padding:2px 7px}
  .vbadge.cp{color:var(--green-deep);background:var(--green-soft)}
  .vbadge.req{color:var(--amber);background:var(--amber-soft)}
  .vbadge.wait{color:var(--amber);background:#fff}
  .vbadge.alt{color:var(--muted);background:var(--stone)}
  .vc-alt{font-size:11.5px;color:var(--muted);margin-top:9px;padding-left:2px}
  .vc-alt a{color:var(--ink-soft);text-decoration:underline;cursor:pointer}

  /* vendors tab roster */
  .roster{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:18px}
  @media (max-width:720px){.roster{grid-template-columns:1fr}}
  .rcard{background:var(--card);border-radius:15px;box-shadow:var(--inset2);padding:16px 17px}
  .rcard.connected{box-shadow:0 0 0 1.4px var(--green) inset}
  .rcard.requested{box-shadow:0 0 0 1.4px var(--amber) inset}
  .rc-head{display:flex;align-items:center;gap:11px}
  .rc-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none;background:var(--ncs);color:var(--nc)}
  .rc-cat{font-size:13.5px;font-weight:700;color:var(--ink)}
  .rc-need{font-size:11.5px;color:var(--muted);margin-top:1px}
  .rc-vendor{display:flex;align-items:center;gap:11px;margin-top:13px;padding-top:13px;border-top:1px solid #f4f1ec}
  .rc-vlogo{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:12px;color:#fff;flex:none}
  .rc-vn{font-size:12.5px;font-weight:700;color:var(--ink)}
  .rc-vs{font-size:11px;font-weight:600;margin-top:1px}
  .rc-vs.ok{color:var(--green-deep)}.rc-vs.wait{color:var(--amber)}.rc-vs.self{color:var(--muted2)}
  .rc-empty{margin-top:13px;padding-top:13px;border-top:1px solid #f4f1ec;display:flex;align-items:center;gap:10px}

  /* connected systems */
  .sysgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-top:13px}
  @media (max-width:720px){.sysgrid{grid-template-columns:1fr}}
  .sys{background:var(--card);border-radius:13px;box-shadow:var(--inset2);padding:14px 15px;display:flex;flex-direction:column}
  .sys.on{box-shadow:0 0 0 1.4px var(--green) inset}
  .sys-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--ncs);color:var(--nc)}
  .sys-n{font-size:13px;font-weight:700;color:var(--ink);margin-top:10px}
  .sys-d{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.45;flex:1}
  .sys-foot{margin-top:11px}

  /* documents */
  .docgrp{margin-top:20px}
  .docgrp .seclab{margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .doc{display:flex;align-items:center;gap:13px;background:var(--card);border-radius:12px;box-shadow:var(--inset2);padding:13px 15px;margin-bottom:8px}
  .doc .di{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none;background:var(--panel);color:var(--muted)}
  .doc.ok .di{background:var(--green-soft);color:var(--green-deep)}
  .doc .dn{font-size:13.5px;font-weight:600;color:var(--ink)}
  .doc .dm{font-size:11.5px;color:var(--muted);margin-top:1px}
  .doc .dact{margin-left:auto;flex:none}

  /* messages */
  .msgwrap{margin-top:18px;background:var(--card);border-radius:15px;box-shadow:var(--inset2);overflow:hidden}
  .mthread{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid #f4f1ec;cursor:pointer}
  .mthread:last-child{border-bottom:0}
  .mthread:hover{background:var(--panel)}
  .mt-n{font-size:13.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px}
  .mt-l{font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:520px}
  .mt-time{margin-left:auto;font-size:11px;color:var(--muted2);flex:none;white-space:nowrap}
  .mdot{width:7px;height:7px;border-radius:50%;background:var(--ember);flex:none}
  .thread-head{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--border)}
  .thread-back{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;cursor:pointer;color:var(--muted);background:none;border:0}
  .thread-back:hover{background:var(--panel)}
  .bubbles{padding:18px 16px;display:flex;flex-direction:column;gap:10px;background:var(--panel)}
  .bub{max-width:80%;font-size:13px;line-height:1.5;padding:10px 13px;border-radius:14px}
  .bub.them{background:var(--card);box-shadow:var(--inset2);align-self:flex-start;border-bottom-left-radius:5px;color:var(--ink-soft)}
  .bub.me{background:var(--ink);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
  .bub .bt{font-size:9.5px;opacity:.6;margin-top:4px;font-weight:600;letter-spacing:.03em}
  .composer{display:flex;gap:9px;padding:12px 14px;border-top:1px solid var(--border);align-items:center}
  .composer input{flex:1;border:0;background:var(--panel);border-radius:99px;padding:11px 16px;font-family:var(--font);font-size:13px;color:var(--ink)}
  .composer input:focus{outline:none;box-shadow:var(--inset2)}

  /* entry gate */
  .gate{position:fixed;inset:0;z-index:500;background:radial-gradient(130% 90% at 50% -20%, #ffffff, var(--bg));display:grid;place-items:center;padding:24px}
  .gate-card{max-width:460px;text-align:center;animation:rise .5s var(--spring)}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .gate-logo{width:56px;height:56px;border-radius:16px;background:var(--ink);display:grid;place-items:center;margin:0 auto 16px}
  .gate-card h1{font-family:var(--display);font-weight:500;font-size:28px;color:var(--ink);line-height:1.16;margin:8px 0}
  .gate-card p{font-size:14px;color:var(--body);line-height:1.62;max-width:410px;margin:0 auto}
  .gate-meta{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);background:var(--card);box-shadow:var(--inset2);border-radius:99px;padding:7px 14px;margin:20px 0}
  .gate-meta .av{width:20px;height:20px;font-size:9px}
  .gate-actions{display:flex;flex-direction:column;align-items:center;gap:12px}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(19,18,16,.34);backdrop-filter:blur(2px);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:500px;max-width:96vw;background:var(--bg);z-index:310;box-shadow:var(--pop-lg);transform:translateX(106%);transition:transform .38s var(--spring);display:flex;flex-direction:column}
  .drawer.on{transform:none}
  .dhead{display:flex;align-items:center;gap:10px;padding:16px 20px 14px;border-bottom:1px solid var(--border)}
  .dback{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;cursor:pointer;color:var(--muted);background:none;border:0;flex:none}
  .dback:hover{background:var(--panel)}
  .dback .ic{transform:rotate(180deg)}
  .dh-id{flex:1;min-width:0}
  .dh-t{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dh-s{font-size:11.5px;color:var(--muted);margin-top:1px}
  .dhead .x{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;cursor:pointer;color:var(--muted);flex:none}
  .dhead .x:hover{background:var(--panel)}
  .dbody{flex:1;overflow-y:auto;padding:20px 22px}
  .dfoot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:9px;align-items:center;background:var(--bg)}
  .row{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--body);padding:6px 0;line-height:1.5}
  .row .ic{color:var(--green);margin-top:2px}
  .note{font-size:12px;color:var(--muted);line-height:1.55;background:var(--panel);border-radius:12px;padding:12px 14px;margin-top:14px}
  .note b{color:var(--ink-soft)}

  /* stepper */
  .stepper{display:flex;align-items:center;gap:7px;margin-bottom:18px}
  .stp{display:flex;align-items:center;gap:7px}
  .stp .sd{width:22px;height:22px;border-radius:50%;box-shadow:var(--inset2);display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--muted2);background:var(--card)}
  .stp .sl{font-size:11px;font-weight:700;color:var(--muted2);white-space:nowrap}
  .stp.on .sd{background:var(--ink);color:#fff;box-shadow:none}.stp.on .sl{color:var(--ink)}
  .stp.done .sd{background:var(--green);color:#fff;box-shadow:none}.stp.done .sl{color:var(--ink-soft)}
  .stp-ln{flex:1;height:1.5px;background:var(--border);min-width:10px}

  /* profile */
  .prof-hero{display:flex;gap:14px;align-items:center;margin-bottom:14px}
  .av{border-radius:50%;display:grid;place-items:center;font-family:var(--display);font-weight:600;color:#fff;flex:none;position:relative;width:56px;height:56px;font-size:19px}
  .av .vck{position:absolute;right:-3px;bottom:-3px;width:20px;height:20px;border-radius:50%;background:var(--green);border:2.5px solid var(--bg);display:grid;place-items:center;color:#fff}
  .av .vck .ic{width:11px;height:11px}
  .prof-name{font-size:17px;font-weight:700;color:var(--ink);font-family:var(--display)}
  .prof-title{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
  .prof-stats{font-size:12px;color:var(--ink-soft);font-weight:600;margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .prof-stats .st{color:var(--amber)}
  .prof-stats span.dot{color:var(--border2)}
  .ribbon{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;border-radius:10px;padding:9px 12px;margin-bottom:12px}
  .ribbon.ok{color:var(--green-deep);background:var(--green-soft)}
  .ribbon.alt{color:var(--amber);background:var(--amber-soft)}
  .prof-blurb{font-size:13.5px;line-height:1.6;color:var(--body)}
  .prodview{display:flex;gap:10px;align-items:flex-start;padding:7px 0}
  .prodview .pv-ic{width:18px;height:18px;border-radius:6px;background:var(--green-soft);color:var(--green-deep);display:grid;place-items:center;flex:none;margin-top:1px}
  .pv-n{font-size:13px;font-weight:600;color:var(--ink)}
  .pv-d{font-size:11.5px;color:var(--muted);margin-top:1px}
  .quote{background:var(--panel);border-radius:12px;padding:12px 14px;margin-bottom:9px}
  .qstars{font-size:11px;color:var(--amber);letter-spacing:1.5px}
  .quote p{font-size:12.5px;line-height:1.55;color:var(--ink-soft);margin-top:5px;font-style:italic}
  .quote .qa{font-size:11px;color:var(--muted);margin-top:7px;font-weight:600}
  .contact{background:var(--card);border-radius:12px;box-shadow:var(--inset2);padding:4px 14px 12px}
  .contact .crow{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-soft);padding:9px 0;border-bottom:1px solid #f4f1ec}
  .contact .crow .ic{color:var(--muted2)}
  .locknote{display:flex;gap:8px;font-size:11px;color:var(--muted);line-height:1.5;padding-top:10px}
  .locknote .ic{color:var(--muted2);flex:none;margin-top:1px}

  /* tailor */
  .dstep-h{font-size:18px;font-weight:600;font-family:var(--display);color:var(--ink)}
  .dstep-s{font-size:12.5px;color:var(--muted);margin:4px 0 14px;line-height:1.5}
  .prod{display:flex;gap:11px;align-items:flex-start;padding:11px 12px;border-radius:11px;box-shadow:var(--inset2);background:var(--card);margin-bottom:8px;cursor:pointer;transition:box-shadow .12s}
  .prod.on{box-shadow:0 0 0 1.6px var(--ink) inset}
  .cbox{width:19px;height:19px;border-radius:6px;box-shadow:var(--inset2);display:grid;place-items:center;color:transparent;flex:none;margin-top:1px;background:var(--card)}
  .prod.on .cbox{background:var(--ink);color:#fff;box-shadow:none}
  .prod .pn{font-size:13px;font-weight:600;color:var(--ink)}
  .prod .pd{font-size:11.5px;color:var(--muted);margin-top:1px}
  .prod .pa{margin-left:auto;font-size:11px;font-weight:700;color:var(--ink-soft);white-space:nowrap;font-family:var(--mono);padding-left:8px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin:9px 0 4px}
  .chip{font-size:12px;font-weight:600;border-radius:99px;padding:7px 13px;box-shadow:var(--inset2);background:var(--card);color:var(--ink-soft);cursor:pointer;border:0;font-family:var(--font)}
  .chip.on{background:var(--ink);color:#fff;box-shadow:none}
  .ta{width:100%;min-height:64px;resize:vertical;border-radius:11px;box-shadow:var(--inset2);background:var(--card);border:0;padding:11px 13px;font-family:var(--font);font-size:13px;color:var(--ink);margin-top:6px}
  .ta:focus{outline:none;box-shadow:0 0 0 1.5px var(--ink) inset}

  /* review */
  .reqcard{background:var(--card);border-radius:13px;box-shadow:var(--inset2);padding:2px 14px;margin-bottom:14px}
  .rq-row{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #f4f1ec;font-size:12.5px;align-items:baseline}
  .reqcard .rq-row:last-child{border-bottom:0}
  .rq-row>span{color:var(--muted);min-width:78px;flex:none}
  .rq-row>b,.rq-row>div{color:var(--ink);font-weight:600;text-align:right;margin-left:auto}
  .rq-row.top{align-items:flex-start}
  .rq-li{display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-bottom:5px}
  .rq-li .ic{color:var(--green);width:13px;height:13px;flex:none}
  .attach{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink-soft);background:var(--card);box-shadow:var(--inset2);border-radius:10px;padding:10px 12px;margin-bottom:7px}
  .attach .ic{color:var(--muted2)}

  /* sent */
  .sent-ok{width:64px;height:64px;border-radius:50%;background:var(--green-soft);color:var(--green);display:grid;place-items:center;margin:6px auto 16px}
  .sent-ok .ic{width:30px;height:30px;stroke-width:2.2}
  .lifecycle{display:flex;align-items:center;gap:7px;justify-content:center;margin:16px 0;flex-wrap:wrap}
  .lc{font-size:11px;font-weight:700;padding:6px 11px;border-radius:99px;white-space:nowrap}
  .lc.done{background:var(--green-soft);color:var(--green-deep)}
  .lc.now{background:var(--ink);color:#fff}
  .lc.next{box-shadow:var(--inset2);color:var(--muted2)}
  .lc-ar{color:var(--border2)}

  /* proposal */
  .proposal{border-radius:14px;box-shadow:var(--inset2);overflow:hidden;margin-bottom:6px}
  .prop-head{display:flex;align-items:center;gap:11px;padding:14px 16px;color:#fff}
  .prop-head .vc-logo{box-shadow:0 0 0 1px rgba(255,255,255,.25)}
  .prop-ht{font-size:13.5px;font-weight:700}
  .prop-hs{font-size:11px;opacity:.85;margin-top:1px}
  .prop-body{background:var(--card);padding:4px 16px 14px}
  .prop-line{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid #f4f1ec}
  .pl-n{font-size:12.5px;font-weight:600;color:var(--ink)}
  .pl-d{font-size:11px;color:var(--muted);margin-top:1px}
  .pl-a{font-size:12px;font-weight:700;color:var(--ink-soft);font-family:var(--mono);white-space:nowrap}
  .prop-total{display:flex;justify-content:space-between;align-items:center;padding:13px 0 6px;font-size:13px}
  .prop-total span{color:var(--muted)}
  .prop-total b{font-size:17px;font-family:var(--display);color:var(--ink)}
  .prop-fine{font-size:10.5px;color:var(--muted2);line-height:1.5;padding-top:8px}

  /* generic modal (system connect) */
  .scrim2{position:fixed;inset:0;background:rgba(19,18,16,.34);backdrop-filter:blur(2px);z-index:320;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim2.on{opacity:1;pointer-events:auto}
  .modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-46%) scale(.97);opacity:0;pointer-events:none;z-index:330;width:410px;max-width:94vw;background:var(--bg);border-radius:18px;box-shadow:var(--pop-lg);padding:24px;transition:opacity .2s,transform .2s}
  .modal.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:var(--font);font-size:13px;font-weight:600;border:0;border-radius:999px;cursor:pointer;padding:9px 15px;transition:transform .1s,background .15s;text-decoration:none;white-space:nowrap}
  .btn:active{transform:scale(.98)}
  .btn--dark{background:var(--ink);color:#fff}.btn--dark:hover{background:#2e2c28}
  .btn--green{background:var(--green);color:#fff}.btn--green:hover{background:#009039}
  .btn--ghost{background:var(--card);color:var(--ink-soft);box-shadow:var(--inset2)}.btn--ghost:hover{background:var(--panel)}
  .btn--sm{padding:7px 12px;font-size:12px}.btn--lg{padding:12px 19px;font-size:14px}.btn--block{width:100%}
  .mlink{color:var(--muted);cursor:pointer;font-size:12px;background:none;border:0;font-family:var(--font)}.mlink:hover{color:var(--ink)}

  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(90px);z-index:400;background:var(--ink);color:#fff;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:11px;box-shadow:var(--pop-lg);transition:transform .35s var(--spring);max-width:92vw}
  #toast.on{transform:translateX(-50%) translateY(0)}
  #toast .ic{color:#7ee2a4}
  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty .ei{width:48px;height:48px;border-radius:14px;background:var(--panel);color:var(--muted2);display:grid;place-items:center;margin:0 auto 14px}
</style>

const $id=s=>document.getElementById(s);
function ic(id,c){ return `<svg class="ic ${c||''}"><use href="#${id}"/></svg>`; }
function toast(msg){ const t=$id('toast'); t.innerHTML=ic('i-check')+`<span>${msg}</span>`; t.classList.add('on'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('on'),3600); }

function avatar(hue,initials,size,verified){
  const s=size||56, f=Math.round(s/3);

}

function rerender(){
  const gate=$id('gate');

  gate.style.display='none'; gate.innerHTML='';
  $id('tbPct').textContent = overallPct()+'%';
  const net = inNetwork();
  const newMsgs = rosterCount('requested');
  $id('tabs').innerHTML = [
    ['roadmap','i-flag','Roadmap',''],
    ['vendors','i-store','Vendors', net?`<span class="badge" style="background:var(--green)">${net}</span>`:''],
    ['documents','i-doc','Documents',''],
    ['messages','i-msg','Messages', newMsgs?`<span class="badge">${newMsgs}</span>`:''],
  ].map(([k,icn,l,b])=>`<button class="${STATE.tab===k?'on':''}" onclick="setTab('${k}')">${ic(icn,'ic--s')} ${l} ${b}</button>`).join('');
  $id('wrap').innerHTML =
    STATE.tab==='vendors'   ? renderVendors() :
    STATE.tab==='documents' ? renderDocuments() :
    STATE.tab==='messages'  ? renderMessages() :

}

function renderRoadmap(){

    const dn=phaseDone(p), tot=p.tasks.length, pct=Math.round(dn/tot*100);

function taskRow(p,ti,t){
  let actPill;
  if(t.done) actPill = `<span class="pill done">${ic('i-check','ic--s')} Done</span>`;
  else if(t.type==='up') actPill = `<span class="pill up">Upload</span>`;
  else if(t.type==='opt') actPill = `<span class="pill opt">Optional</span>`;
  else actPill='';
  let extra='';
  if(t.svc) extra=vendorConnect(p,ti,t);
  else if(t.sys) extra=systemConnect(t);
  return `<div class="task ${t.done?'done':''}">
      <div class="tk" onclick="toggleTask('${p.id}',${ti})">${ic('i-check','ic--s')}</div>
      <div style="flex:1;min-width:0"><div class="tt">${t.t}</div><div class="td">${t.d}</div>${extra}</div>
      <div class="tact">${actPill}</div>
    </div>`;
}

      <div><span class="seclab">Documents</span>
        <h1 style="font-family:var(--display);font-weight:500;font-size:24px;color:var(--ink);margin-top:7px">Your launch paperwork</h1>
        <div style="font-size:13px;color:var(--muted);margin-top:3px">Every agreement, certificate, and brand file in one place. ${docs.filter(d=>d.grp==='Awaiting you').length} awaiting you.</div></div>
    </div>`;
  const body=grps.map(g=>{
    const items=docs.filter(d=>d.grp===g);
    const icon = g==='Signed & filed'?'i-check':g==='Awaiting you'?'i-clock':'i-flag';
    return `<div class="docgrp"><div class="seclab">${ic(icon,'ic--s')} ${g} · ${items.length}</div>
      ${items.map(d=>`<div class="doc ${d.act==='view'||d.act==='download'?(d.grp==='Signed & filed'?'ok':''):''}">
        <div class="di">${ic(d.icon,'ic--s')}</div>
        <div style="min-width:0"><div class="dn">${d.name}</div><div class="dm">${d.meta}</div></div>
        <div class="dact">${docAct(d.act)}</div></div>`).join('')}</div>`;
  }).join('');
  return head+body;
}

/* ---------- messages tab ---------- */
function threads(){
  const list=[{ id:'hq', name:'Bright Pickleball HQ', who:'Franchise Operations', hue:'18', initials:'BP', brand:true,
    last:'Welcome, Maya! Your roadmap is live — reach out any time you need us.', time:'2d', unread:false,
    msgs:[
      {from:'them', t:'Welcome to the Bright Pickleball family, Maya! 🎉 Your Tucson #1 onboarding portal is live.', at:'Mon 9:02 AM'},
      {from:'them', t:'Work the roadmap at your pace. At each step that needs a pro, we’ve lined one up for you. Anything you need, we’re right here.', at:'Mon 9:03 AM'},
      {from:'me', t:'Thank you! Excited to get going. Starting on the entity setup now.', at:'Mon 9:20 AM'},
    ]}];
  Object.entries(STATE.roster).forEach(([k,r])=>{
    if(r&&(r.status==='engaged'||r.status==='requested')){
      const v=vendorView(k,r.id);
      list.push({ id:k, name:r.who, who:r.name, hue:v.hue, initials:v.initials, unread:r.status==='requested',
        last: r.status==='requested'?'Got your request — I’ll have a proposal over to you shortly.':'Sounds good — I’ll get started. Talk soon!',
        time: r.status==='requested'?'1h':'3h',
        msgs: r.status==='requested'
          ? [{from:'them', t:`Hi Maya — thanks for the request through Bright Pickleball. I’ve got your unit details and brand terms; a pre-filled proposal is on its way.`, at:'Today'}]
          : [{from:'them', t:`Hi Maya — great to be working with you on Tucson #1. I’ll get started right away and keep you posted here.`, at:'Today'},
             {from:'me', t:`Perfect, thank you ${firstName(r.who)}!`, at:'Today'}] });
    }
  });
  return list;
}
function renderMessages(){
  const list=threads();
  if(STATE.thread){
    const th=list.find(t=>t.id===STATE.thread) || list[0];
    return `<div class="msgwrap">
      <div class="thread-head">
        <button class="thread-back" onclick="STATE.thread=null;rerender()">${ic('i-chev')}</button>
        ${avatar(th.hue,th.initials,36,th.brand?false:STATE.roster[th.id]&&STATE.roster[th.id].status==='engaged')}
        <div><div class="mt-n">${th.name}</div><div style="font-size:11.5px;color:var(--muted)">${th.who}</div></div>
      </div>
      <div class="bubbles">${th.msgs.map(m=>`<div class="bub ${m.from}">${m.t}<div class="bt">${m.at}</div></div>`).join('')}</div>
      <div class="composer"><input placeholder="Message ${firstName(th.name)}…" onkeydown="if(event.key==='Enter'){this.value='';toast('Messaging is live in the full app')}"><button class="btn btn--dark btn--sm" onclick="toast('Messaging is live in the full app')">Send</button></div>
    </div>`;
  }
  const head=`<span class="seclab">Messages</span>
    <h1 style="font-family:var(--display);font-weight:500;font-size:24px;color:var(--ink);margin-top:7px">Your conversations</h1>
    <div style="font-size:13px;color:var(--muted);margin-top:3px">Bright Pickleball and every vendor you connect, in one inbox.</div>`;
  const rows=list.map(th=>`<div class="mthread" onclick="STATE.thread='${th.id}';rerender()">
      ${avatar(th.hue,th.initials,38,th.brand?false:STATE.roster[th.id]&&STATE.roster[th.id].status==='engaged')}
      <div style="flex:1;min-width:0"><div class="mt-n">${th.name}${th.unread?'<span class="mdot"></span>':''}</div><div class="mt-l">${th.last}</div></div>
      <span class="mt-time">${th.time}</span>
    </div>`).join('');
  const hint = list.length<2 ? `<div class="note" style="margin-top:14px">Connect a vendor from your Roadmap and a direct conversation with them opens here automatically.</div>` : '';
  return head + `<div class="msgwrap">${rows}</div>` + hint;
}

/* ---------- system connect modal ---------- */
let MODAL_SYS=null;
function openSystem(k){
  MODAL_SYS=k; const s=SYSTEMS[k];
  $id('modal').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div class="sys-ic" style="width:40px;height:40px;border-radius:11px;background:${COLORS[s.color][1]};color:${COLORS[s.color][0]}">${ic(s.icon)}</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:var(--ink)">Connect ${s.name}</div><div style="font-size:11.5px;color:var(--muted)">${s.tag}</div></div>
      <button class="dback" onclick="closeModal()" style="transform:none">${ic('i-x')}</button>
    </div>
    <p style="font-size:13px;line-height:1.6;color:var(--body)">${s.detail}</p>
    <div class="note" style="display:flex;gap:9px;align-items:flex-start"><span style="margin-top:1px">${ic('i-lock','ic--s')}</span><span><b>You stay in control.</b> This is a secure, read-only connection. CoverPanda never sees or stores your login, and never moves money.</span></div>
    <button class="btn btn--dark btn--lg btn--block" style="margin-top:16px" onclick="confirmSystem()">Continue to ${s.name} ${ic('i-arrow','ic--s')}</button>
    <button class="mlink" style="display:block;margin:11px auto 0" onclick="closeModal()">Cancel</button>`;
  $id('mscrim').classList.add('on'); $id('modal').classList.add('on');
}
function closeModal(){ $id('mscrim').classList.remove('on'); $id('modal').classList.remove('on'); }
function confirmSystem(){
  const k=MODAL_SYS, s=SYSTEMS[k];
  STATE.systems[k]='connected';
  // mark the related roadmap task done (e.g. POS install)
  STATE.phases.forEach(p=>p.tasks.forEach(t=>{ if(t.sys===k) t.done=true; }));
  closeModal(); rerender();
  toast(`${s.name} connected · syncing now`);
}

/* ---------- the marketplace engagement drawer (profile → tailor → review → proposal → connect) ---------- */
let DRAWER=null; // {svc, id, step, sel:{idx:bool}, ctx:idx, note}
const CTX = {
  formation:{ q:'Entity type', opts:['Single-member LLC','Multi-member LLC','S-corp election'], def:0 },
  lending:{ q:'Build-out funding needed', opts:['$200K–$350K','$350K–$500K','$500K–$650K'], def:1 },
  insurance:{ q:'Coverage tier', opts:['Brand minimum ($2M GL)','Enhanced ($3M GL)','Umbrella +'], def:0 },
  payroll:{ q:'Team size at open', opts:['1–10','11–25','26+'], def:1 },
  accounting:{ q:'Bookkeeping cadence', opts:['Monthly','Bi-weekly','Weekly'], def:0 },
};
function defaultSel(v){ const s={}; v.products.forEach((p,i)=>{ if(p.rec) s[i]=true; }); return s; }
function selectedProducts(v){ return v.products.filter((p,i)=>DRAWER.sel[i]); }

function openVendor(svc, opts){
  opts=opts||{}; const r=STATE.roster[svc];
  const id = opts.id || (r&&r.id? r.id : 'cp');
  let step = opts.step || (r&&r.status==='engaged'?'engaged' : r&&r.status==='requested'?'sent' : 'profile');
  const v=vendorView(svc, id);
  DRAWER={ svc, id, step, sel:defaultSel(v), ctx:CTX[svc].def, note:'' };
  renderDrawer();
  $id('scrim').classList.add('on'); $id('drawer').classList.add('on');
}
function closeDrawer(){ $id('scrim').classList.remove('on'); $id('drawer').classList.remove('on'); }
function goStep(step){ DRAWER.step=step; renderDrawer(); }

function stepper(phase){
  const idx={request:0,proposal:1,connected:2}[phase];
  const labels=['Request','Proposal','Connected'];
  return `<div class="stepper">`+labels.map((l,i)=>{
    const cls=i<idx?'done':(i===idx?'on':'');
    const inner=i<idx?ic('i-check','ic--s'):(i+1);
    return `<div class="stp ${cls}"><div class="sd">${inner}</div><div class="sl">${l}</div></div>`+(i<2?`<div class="stp-ln"></div>`:'');
  }).join('')+`</div>`;
}

function renderDrawer(){
  const {svc,id,step}=DRAWER; const v=vendorView(svc,id);
  const backMap={ tailor:'profile', review:'tailor' };
  const labelMap={ profile:`${v.cat} · CoverPanda marketplace`, tailor:'Step 1 of 2 · Tailor your request', review:'Step 2 of 2 · Review & send', sent:'Request sent', proposal:'Your proposal', engaged:'Connected & active' };
  let body='', foot='';

  if(step==='profile'){
    body = stepper('request') + `
      <div class="prof-hero">${avatar(v.hue,v.initials,56,v.recommended)}
        <div style="flex:1;min-width:0">
          <div class="prof-name">${v.person}</div>
          <div class="prof-title">${v.title} · ${v.firm}</div>
          <div class="prof-stats"><span class="st">★ ${v.rating}</span><span class="dot">·</span> ${v.reviews} reviews <span class="dot">·</span> ${ic('i-clock','ic--s')} replies ${v.response}</div>
        </div></div>
      ${v.recommended
        ? `<div class="ribbon ok">${ic('i-check','ic--s')} Bright Pickleball–approved for this step</div>`
        : `<div class="ribbon alt">Marketplace alternative · Bright Pickleball recommends <b>&nbsp;${v.recName}</b></div>`}
      <p class="prof-blurb">${v.blurb}</p>
      <div class="seclab" style="margin:18px 0 9px">What ${firstName(v.person)} handles for this step</div>
      ${v.products.map(p=>`<div class="prodview"><div class="pv-ic">${ic('i-check','ic--s')}</div><div><div class="pv-n">${p.name}</div><div class="pv-d">${p.note}</div></div></div>`).join('')}
      <div class="seclab" style="margin:18px 0 9px">What other franchisees say</div>
      ${v.quotes.map(q=>`<div class="quote"><div class="qstars">★★★★★</div><p>“${q.text}”</p><div class="qa">${q.who} · ${q.unit}</div></div>`).join('')}
      <div class="seclab" style="margin:18px 0 9px">Contact</div>
      <div class="contact">
        <div class="crow">${ic('i-phone','ic--s')} ${v.contact.phone}</div>
        <div class="crow">${ic('i-mail','ic--s')} ${v.contact.email}</div>
        <div class="crow" style="border-bottom:0">${ic('i-globe','ic--s')} ${v.contact.site}</div>
        <div class="locknote">${ic('i-lock','ic--s')} Full contact details unlock once you connect — your info stays private until you choose to share it.</div>
      </div>
      <button class="mlink" style="display:block;margin-top:16px" onclick="declineVendor('${svc}')">I’ll handle this step off-platform →</button>`;
    foot = `<button class="mlink" onclick="openVendor('${svc}',{id:'${v.recommended?'alt':'cp'}'})">${v.recommended?`Compare ${v.alt.name}`:`See ${v.recName}`}</button>
      <span style="flex:1"></span>
      <button class="btn btn--green btn--lg" onclick="goStep('tailor')">Request intro & proposal ${ic('i-arrow','ic--s')}</button>`;
  }

  else if(step==='tailor'){
    body = stepper('request') + `
      <div class="dstep-h">Tell ${firstName(v.person)} what you need</div>
      <div class="dstep-s">Pre-filled from your unit (Tucson #1) and Bright Pickleball’s terms. Toggle anything off, or add an extra.</div>
      ${v.products.map((p,i)=>`<div class="prod ${DRAWER.sel[i]?'on':''}" onclick="DRAWER.sel[${i}]=!DRAWER.sel[${i}];renderDrawer()">
        <div class="cbox">${ic('i-check','ic--s')}</div>
        <div style="flex:1"><div class="pn">${p.name}${p.rec?'':' <span style="font-weight:600;color:var(--muted2);font-size:11px">· add-on</span>'}</div><div class="pd">${p.note}</div></div>
        <div class="pa">${p.amount}</div></div>`).join('')}
      <div class="seclab" style="margin:16px 0 0">${CTX[svc].q}</div>
      <div class="chips">${CTX[svc].opts.map((o,i)=>`<button class="chip ${DRAWER.ctx===i?'on':''}" onclick="DRAWER.ctx=${i};renderDrawer()">${o}</button>`).join('')}</div>
      <div class="seclab" style="margin:14px 0 0">Anything to add? <span style="text-transform:none;letter-spacing:0;font-weight:500;color:var(--muted2)">(optional)</span></div>
      <textarea class="ta" placeholder="e.g., I'm aiming to sign my lease in the next 30 days…" oninput="DRAWER.note=this.value">${DRAWER.note}</textarea>`;
    foot = `<button class="btn btn--ghost" onclick="goStep('profile')">Back</button><span style="flex:1"></span>
      <button class="btn btn--dark btn--lg" onclick="goStep('review')">Review request ${ic('i-arrow','ic--s')}</button>`;
  }

  else if(step==='review'){
    const sel=selectedProducts(v);
    body = stepper('request') + `
      <div class="dstep-h">Review your request</div>
      <div class="dstep-s">This is exactly what ${firstName(v.person)} receives — nothing sent until you hit send.</div>
      <div class="reqcard">
        <div class="rq-row"><span>To</span><b>${v.person} · ${v.firm}</b></div>
        <div class="rq-row"><span>From</span><b>Maya Chen · Tucson #1</b></div>
        <div class="rq-row top"><span>Requesting</span><div>${sel.length?sel.map(p=>`<div class="rq-li">${ic('i-check','ic--s')} ${p.name}</div>`).join(''):'<span style="color:var(--muted2)">No items selected</span>'}</div></div>
        <div class="rq-row"><span>${CTX[svc].q}</span><b>${CTX[svc].opts[DRAWER.ctx]}</b></div>
        ${DRAWER.note?`<div class="rq-row top"><span>Note</span><div style="font-weight:500">${DRAWER.note}</div></div>`:''}
      </div>
      <div class="seclab" style="margin-bottom:9px">Attached automatically</div>
      <div class="attach">${ic('i-store','ic--s')} Your unit profile — Bright Pickleball Tucson #1</div>
      <div class="attach">${ic('i-doc','ic--s')} Bright Pickleball brand terms</div>
      ${svc==='insurance'?`<div class="attach">${ic('i-shield','ic--s')} FDD insurance minimums ($2M GL)</div>`:''}
      <div class="note">🐼 Because this rides the marketplace, ${firstName(v.person)} gets your details and brand terms instantly — so you get a pre-filled proposal back, not a blank intake form.</div>`;
    foot = `<button class="btn btn--ghost" onclick="goStep('tailor')">Back</button><span style="flex:1"></span>
      <button class="btn btn--green btn--lg" ${sel.length?'':'disabled style="opacity:.5"'} onclick="requestVendor()">Send request to ${firstName(v.person)} ${ic('i-arrow','ic--s')}</button>`;
  }

  else if(step==='sent'){
    body = stepper('proposal') + `
      <div class="sent-ok">${ic('i-check')}</div>
      <div class="dstep-h" style="text-align:center">Request sent to ${firstName(v.person)}</div>
      <div class="dstep-s" style="text-align:center;max-width:340px;margin:6px auto 0">${v.person} now has your unit details and Bright Pickleball’s terms. You’ll get a pre-filled proposal back — usually within ${v.response.replace('~','about ')}.</div>
      <div class="lifecycle">
        <span class="lc done">${ic('i-check','ic--s')} Requested</span><span class="lc-ar">${ic('i-arrow','ic--s')}</span>
        <span class="lc now">Proposal</span><span class="lc-ar">${ic('i-arrow','ic--s')}</span>
        <span class="lc next">Sign &amp; kick off</span>
      </div>
      <div class="note">Added to your Vendors as <b>“Requested,”</b> and a conversation with ${firstName(v.person)} just opened in Messages. Keep working your roadmap — I’ll ping you the moment the proposal lands.</div>`;
    foot = `<button class="btn btn--ghost" onclick="closeDrawer()">Back to roadmap</button><span style="flex:1"></span>
      <button class="btn btn--dark btn--lg" onclick="goStep('proposal')">Preview the proposal ${ic('i-arrow','ic--s')}</button>`;
  }

  else if(step==='proposal'){
    const sel=selectedProducts(v); const lines=sel.length?sel:v.products.filter(p=>p.rec);
    body = stepper('proposal') + `
      <div class="dstep-h">${firstName(v.person)} sent your proposal</div>
      <div class="dstep-s">Pre-filled to Tucson #1 and your brand terms. Review, then sign &amp; pay — all right here.</div>
      <div class="proposal">
        <div class="prop-head" style="background:${v.logoBg}">
          <div class="vc-logo" style="width:30px;height:30px;background:rgba(255,255,255,.16)">${v.logo}</div>
          <div><div class="prop-ht">${v.name} — ${v.cat}</div><div class="prop-hs">Prepared for Maya Chen · Tucson #1</div></div>
        </div>
        <div class="prop-body">
          ${lines.map(p=>`<div class="prop-line"><div><div class="pl-n">${p.name}</div><div class="pl-d">${p.note}</div></div><div class="pl-a">${p.amount}</div></div>`).join('')}
          <div class="prop-total"><span>${v.totalLabel}</span><b>${v.total}</b></div>
          <div class="prop-fine">Sample estimate · finalized with you before anything is charged. Sign &amp; pay on CoverPanda’s rails — agreement and payment stay in your portal.</div>
        </div>
      </div>
      <div class="note">🐼 Brand terms are already baked in${svc==='insurance'?' — written to your FDD minimums':''}. Accept and ${firstName(v.person)} joins your team; this step checks off your roadmap automatically.</div>`;
    foot = `<button class="mlink" onclick="STATE.tab='messages';STATE.thread='${svc}';closeDrawer();rerender()">Message ${firstName(v.person)}</button><span style="flex:1"></span>
      <button class="btn btn--green btn--lg" onclick="engageVendor()">Accept &amp; connect ${firstName(v.person)} ${ic('i-arrow','ic--s')}</button>`;
  }

  else if(step==='engaged'){
    body = stepper('connected') + `
      <div class="prof-hero">${avatar(v.hue,v.initials,56,true)}
        <div style="flex:1;min-width:0"><div class="prof-name">${v.person}</div>
          <div class="prof-title">${v.title} · ${v.firm}</div>
          <div class="prof-stats"><span class="st">★ ${v.rating}</span><span class="dot">·</span> replies ${v.response}</div></div></div>
      <div class="ribbon ok">${ic('i-check','ic--s')} Connected &amp; active · handling your ${v.cat.toLowerCase()}</div>
      <div class="seclab" style="margin:14px 0 9px">What ${firstName(v.person)} is handling</div>
      ${(selectedProducts(v).length?selectedProducts(v):v.products.filter(p=>p.rec)).map(p=>`<div class="prodview"><div class="pv-ic">${ic('i-check','ic--s')}</div><div><div class="pv-n">${p.name}</div><div class="pv-d">${p.note}</div></div></div>`).join('')}
      <div class="note">Agreements and payments run here, so this stays in your Vendors roster as your single source of truth. Need a change? Message ${firstName(v.person)} any time.</div>`;
    foot = `<button class="mlink" onclick="STATE.tab='messages';STATE.thread='${svc}';closeDrawer();rerender()">${ic('i-msg','ic--s')} Message ${firstName(v.person)}</button><span style="flex:1"></span>
      <button class="btn btn--ghost" onclick="closeDrawer()">Done</button>`;
  }

  $id('drawer').innerHTML = `
    <div class="dhead">
      ${backMap[step]?`<button class="dback" onclick="goStep('${backMap[step]}')">${ic('i-chev')}</button>`:''}
      <div class="dh-id"><div class="dh-t">${v.name}</div><div class="dh-s">${labelMap[step]}</div></div>
      <div class="x" onclick="closeDrawer()">${ic('i-x')}</div>
    </div>
    <div class="dbody">${body}</div>
    <div class="dfoot">${foot}</div>`;
}

function requestVendor(){
  const {svc,id}=DRAWER; const v=vendorView(svc,id);
  STATE.roster[svc]={ id, name:v.name, who:v.person, status:'requested' };
  DRAWER.step='sent'; renderDrawer(); rerender();
  toast(`Request sent to ${v.person}`);
}
function engageVendor(){
  const {svc,id}=DRAWER; const v=vendorView(svc,id);
  STATE.roster[svc]={ id, name:v.name, who:v.person, status:'engaged' };
  STATE.phases.forEach(p=>p.tasks.forEach(t=>{ if(t.svc===svc) t.done=true; }));
  DRAWER.step='engaged'; renderDrawer(); rerender();
  toast(`${v.person} is on your team 🎉`);
}
function declineVendor(svc){
  STATE.roster[svc]={ id:null, name:'Self-managed', who:'Your own provider', status:'self' };
  closeDrawer(); rerender();
  toast('Marked self-managed — connect a vendor any time');
}

/* ---------- interactions ---------- */
function togglePhase(id){ const p=STATE.phases.find(x=>x.id===id); p.open=!p.open; rerender(); }
function toggleTask(pid,ti){ const t=STATE.phases.find(p=>p.id===pid).tasks[ti]; t.done=!t.done; rerender(); }

rerender();
</script>
